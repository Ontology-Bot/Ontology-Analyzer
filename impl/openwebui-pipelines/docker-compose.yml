services:
  wiki-generator:
    build:
      context: ./app/prototypes/querycaching/wiki-generator
    container_name: wiki-generator
    environment:
      GRAPHDB_ENDPOINT: http://host.docker.internal:7200/repositories/ontobot
      QUERY_DIR: /app/queries
      OUTPUT_DIR: /output
    volumes:
      - ./app/prototypes/querycaching/wiki-data:/output

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    volumes:
      - ./app/pipelines:/app/pipelines
      - ./app/prototypes:/app/prototypes
    ports:
      - "9099:9099"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PIPELINES_API_KEY: free_pass
      LLM_PROVIDER: "openai_compat"
      LLM_BASE_URL: "https://chat-ai.academiccloud.de/v1/"
      LLM_API_KEY: ""
      LLM_DEFAULT_MODEL: "openai-gpt-oss-120b"
      SPARQL_BASE_URL: "http://172.17.0.1:7200/repositories/ontobot"
    restart: unless-stopped

volumes:
  pipelines: